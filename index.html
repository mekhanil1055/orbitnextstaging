<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>OrbitNext 2.0</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
:root{
  --red:#AB1E23;--red2:#7A1518;--navy:#2B2D42;
  --bg:#F0F2F5;--card:#fff;--border:#E2E6EA;--text:#1A1D2E;--muted:#6B7280;
  --on-track:#2E7D32;--on-track-bg:#E8F5E9;--on-track-border:#A5D6A7;
  --minor:#7A6000;--minor-bg:#FFFDE7;--minor-border:#F9A825;
  --needs:#BF5000;--needs-bg:#FFF3E0;--needs-border:#FB8C00;
  --at-risk:#C62828;--at-risk-bg:#FFEBEE;--at-risk-border:#EF9A9A;
  --off-track:#4A0000;--off-track-bg:#FCE4E4;--off-track-border:#B71C1C;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.5;min-height:100vh}

/* HEADER */
.hdr{background:#fff;border-bottom:1px solid var(--border);padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:68px;position:sticky;top:0;z-index:100;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.hdr-logo img{height:48px;width:auto}
.hdr-center{text-align:center}
.hdr-title{font-size:14px;font-weight:700;color:var(--navy);letter-spacing:.02em}
.hdr-tag{font-size:12px;color:var(--muted);margin-top:1px;font-style:italic}
.hdr-right{display:flex;align-items:center;gap:12px}
.ts-wrap{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);background:#f7f8fa;padding:6px 12px;border-radius:8px;border:1px solid var(--border)}
.ts-wrap i{color:var(--red);font-size:14px}
.rbtn{background:var(--red);color:#fff;border:none;padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s;display:flex;align-items:center;gap:6px}
.rbtn:hover{background:var(--red2)}

/* MAIN */
.main{padding:28px 32px;max-width:1200px;margin:0 auto}

/* PROGRAM OVERVIEW STRIP */
.prog-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px}
.prog-cell{background:#fff;border-radius:14px;border:1px solid var(--border);padding:18px 20px;box-shadow:0 2px 6px rgba(0,0,0,.04)}
.prog-cell-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
.prog-cell-val{font-size:28px;font-weight:700;font-family:'DM Mono',monospace;color:var(--navy)}
.prog-cell-sub{font-size:12px;color:var(--muted);margin-top:3px}

/* SECTION CARDS */
.section-card{background:#fff;border-radius:16px;border:1px solid var(--border);overflow:hidden;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.section-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 22px;border-bottom:1px solid var(--border)}
.section-hdr-left{display:flex;align-items:center;gap:8px}
.section-hdr-left i{font-size:16px}
.section-hdr-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.section-hdr-badge{font-size:12px;opacity:.7}
.section-body{padding:22px 24px}

/* TREND CHART */
.trend-bars{display:flex;align-items:flex-end;gap:10px;height:80px;margin-bottom:16px}
.trend-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;justify-content:flex-end}
.trend-bar{width:100%;border-radius:5px 5px 0 0;min-height:5px}
.trend-bar-label{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace}
.trend-bar-val{font-size:11px;font-family:'DM Mono',monospace}
.trend-summary{display:flex;align-items:center;gap:24px;padding-top:14px;border-top:1px solid var(--border);flex-wrap:wrap}
.trend-stat{display:flex;flex-direction:column;gap:2px}
.trend-stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.trend-stat-val{font-size:22px;font-weight:700;font-family:'DM Mono',monospace}
.initiative-pills{display:flex;flex-wrap:wrap;gap:8px;margin-left:auto}
.init-pill{display:flex;align-items:center;gap:6px;background:#f7f8fa;border:1px solid var(--border);border-radius:10px;padding:6px 12px}
.init-pill-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.init-pill-name{font-size:12px;color:var(--navy);font-weight:500}
.init-pill-score{font-size:12px;font-family:'DM Mono',monospace;font-weight:700}

/* DELAYED */
.delayed-group{margin-bottom:18px}
.delayed-group:last-child{margin-bottom:0}
.delayed-group-title{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.delayed-group-title i{font-size:14px}
.delayed-group-title span{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em}
.delayed-list{border-radius:10px;overflow:hidden}
.delayed-row{display:flex;align-items:center;gap:12px;padding:11px 15px;border-bottom:1px solid}
.delayed-row:last-child{border-bottom:none}
.delayed-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.delayed-name{flex:1;font-size:13px;font-weight:600;color:var(--navy);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.delayed-detail{font-size:12px;color:var(--muted);margin-top:2px}
.init-tag{font-size:11px;font-weight:600;color:#fff;padding:2px 9px;border-radius:99px;white-space:nowrap;flex-shrink:0}
.all-clear{display:flex;align-items:center;gap:10px;color:#2E7D32;font-size:14px;font-weight:500}
.all-clear i{font-size:20px}

/* UPCOMING */
.upcoming-list{border:1px solid #C8E6C9;border-radius:10px;overflow:hidden}
.upcoming-row{display:flex;align-items:center;gap:14px;padding:11px 15px;border-bottom:1px solid #C8E6C9}
.upcoming-row:last-child{border-bottom:none}
.upcoming-date-box{min-width:54px;text-align:center;border-radius:9px;padding:5px 7px;border:1px solid}
.upcoming-date-day{font-size:18px;font-weight:700;font-family:'DM Mono',monospace;line-height:1}
.upcoming-date-mon{font-size:10px;text-transform:uppercase}
.upcoming-name{flex:1;font-size:13px;font-weight:600;color:var(--navy)}
.upcoming-meta{font-size:12px;color:var(--muted);margin-top:2px;display:flex;align-items:center;gap:5px}
.upcoming-meta-dot{width:6px;height:6px;border-radius:50%}
.upcoming-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.upcoming-days{font-size:11px;font-weight:600}
.no-upcoming{font-size:13px;color:var(--muted);font-style:italic}

/* INITIATIVE CARDS */
.cards{display:flex;flex-direction:column;gap:18px}
.icard{background:#fff;border-radius:16px;border:1px solid var(--border);overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.icard-accent{height:4px;width:100%}
.icard-top{display:flex;align-items:flex-start;justify-content:space-between;padding:22px 24px 18px}
.icard-left{flex:1}
.icard-name{font-size:19px;font-weight:700;color:var(--navy);margin-bottom:5px}
.icard-meta{font-size:13px;color:var(--muted);display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.icard-meta i{font-size:13px}
.icard-right{display:flex;flex-direction:column;align-items:flex-end;gap:10px;padding-left:24px}
.score-ring{position:relative;width:80px;height:80px;flex-shrink:0}
.score-ring svg{transform:rotate(-90deg)}
.score-ring-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.score-num{font-size:20px;font-weight:700;color:var(--navy);font-family:'DM Mono',monospace;line-height:1}
.score-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-top:2px}
.status-pill{font-size:12px;font-weight:700;padding:5px 14px;border-radius:99px;border:1px solid;white-space:nowrap;letter-spacing:.02em}
.spark-wrap{display:flex;align-items:flex-end;gap:3px;height:28px}
.spark-bar{width:12px;border-radius:3px 3px 0 0;min-height:4px}

/* SCORE BREAKDOWN BAR */
.icard-breakdown{border-top:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;gap:0;background:#fafbfc}
.bd-item{flex:1;display:flex;flex-direction:column;gap:3px;padding:0 16px;border-right:1px solid var(--border)}
.bd-item:first-child{padding-left:0}
.bd-item:last-child{border-right:none}
.bd-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em}
.bd-val{font-size:16px;font-weight:700;font-family:'DM Mono',monospace}
.bd-sub{font-size:11px;color:var(--muted)}
.bd-bar{height:4px;border-radius:99px;background:#EEF0F2;margin-top:4px;overflow:hidden}
.bd-bar-fill{height:100%;border-radius:99px}
.adj-pos{color:#2E7D32}
.adj-neg{color:#C62828}
.adj-zero{color:var(--muted)}

/* TREND ARROW */
.trend-up{color:#2E7D32;display:inline-flex;align-items:center;gap:3px;font-size:12px;font-weight:600}
.trend-dn{color:#C62828;display:inline-flex;align-items:center;gap:3px;font-size:12px;font-weight:600}
.trend-st{color:var(--muted);display:inline-flex;align-items:center;gap:3px;font-size:12px;font-weight:600}

/* LOADING */
.loading{text-align:center;padding:80px 20px;color:var(--muted);font-size:14px}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}

.footer{text-align:center;padding:28px;font-size:12px;color:var(--muted);border-top:1px solid var(--border);margin-top:8px}
.footer a{color:var(--red);text-decoration:none}

@media(max-width:768px){
  .main{padding:16px}
  .prog-strip{grid-template-columns:1fr 1fr}
  .icard-breakdown{flex-wrap:wrap;gap:12px}
  .bd-item{border-right:none;padding:0;flex:0 0 45%}
}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-logo">
    <img src="https://mekhanil1055.github.io/orbitnext-dashboard/inapp-logo.png" alt="InApp"
         onerror="this.style.display='none'">
  </div>
  <div class="hdr-center">
    <div class="hdr-title">OrbitNext 2.0 — Initiative Tracker</div>
    <div class="hdr-tag">One Team. One Mission. One Leap Forward.</div>
  </div>
  <div class="hdr-right">
    <div class="ts-wrap"><i class="ti ti-clock"></i><span id="ts">Loading...</span></div>
    <button class="rbtn" onclick="loadData()"><i class="ti ti-refresh"></i> Refresh</button>
  </div>
</div>

<div class="main" id="main">
  <div class="loading"><div class="spinner"></div>Loading initiative data...</div>
</div>

<div class="footer">
  OrbitNext 2.0 &middot; InApp Information Technologies &middot;
  <a href="https://www.inapp.com" target="_blank">inapp.com</a> &middot;
  Data sourced live from Google Sheets
</div>

<script>
var DATA_URL = "https://script.google.com/macros/s/AKfycbwgkS45kGFl1s-8z-W2nFdO4YQYEE-I3DbM2XbZ5G4sQUsA6uJaxu3X6GNTg5LZJmBvWg/exec?serve=data";

var PROGRAM_START = new Date("2026-05-01");

var STATUS_MAP = {
  "On Track":       {cls:"on-track",  dot:"#2E7D32", pill:"pill-on"},
  "Minor Concerns": {cls:"minor",     dot:"#F9A825", pill:"pill-minor"},
  "Needs Attention":{cls:"needs",     dot:"#FB8C00", pill:"pill-needs"},
  "At Risk":        {cls:"at-risk",   dot:"#EF5350", pill:"pill-risk"},
  "Off Track":      {cls:"off-track", dot:"#B71C1C", pill:"pill-off"}
};

var PILL_CSS = {
  "pill-on":    "background:#E8F5E9;color:#2E7D32;border-color:#A5D6A7",
  "pill-minor": "background:#FFFDE7;color:#7A6000;border-color:#F9A825",
  "pill-needs": "background:#FFF3E0;color:#BF5000;border-color:#FB8C00",
  "pill-risk":  "background:#FFEBEE;color:#C62828;border-color:#EF9A9A",
  "pill-off":   "background:#FCE4E4;color:#4A0000;border-color:#B71C1C"
};

function sm(s){ return STATUS_MAP[s] || STATUS_MAP["Needs Attention"]; }
function pc(s){ var m=sm(s); return PILL_CSS[m.pill]||""; }

function progColor(p){
  return p>=85?"#2E7D32":p>=70?"#F9A825":p>=50?"#FB8C00":p>=30?"#EF5350":"#B71C1C";
}

function weekNum(){
  return Math.floor((new Date()-PROGRAM_START)/(7*24*60*60*1000))+1;
}

function parseDate(str){
  if(!str) return null;
  str=(str+"").trim();
  var m=str.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(m) return new Date(+m[1],+m[2]-1,+m[3]);
  m=str.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})/);
  if(m) return new Date(+m[3],+m[2]-1,+m[1]);
  var d=new Date(str); return isNaN(d)?null:d;
}

function adjClass(v){
  return v>0?"adj-pos":v<0?"adj-neg":"adj-zero";
}
function adjStr(v){
  return v>0?"+"+v:String(v);
}

function trendArrow(t){
  if(t==="up")   return '<span class="trend-up"><i class="ti ti-trending-up"></i> Improving</span>';
  if(t==="down") return '<span class="trend-dn"><i class="ti ti-trending-down"></i> Declining</span>';
  return '<span class="trend-st"><i class="ti ti-minus"></i> Stable</span>';
}

function scoreRing(score, color){
  var r=34, circ=2*Math.PI*r;
  var dash=circ*(score/100), gap=circ-dash;
  return '<div class="score-ring">'
    +'<svg width="80" height="80" viewBox="0 0 80 80">'
    +'<circle cx="40" cy="40" r="'+r+'" fill="none" stroke="#EEF0F2" stroke-width="6"/>'
    +'<circle cx="40" cy="40" r="'+r+'" fill="none" stroke="'+color+'" stroke-width="6" '
    +'stroke-dasharray="'+dash+' '+gap+'" stroke-linecap="round"/>'
    +'</svg>'
    +'<div class="score-ring-inner">'
    +'<div class="score-num">'+score+'</div>'
    +'<div class="score-lbl">Score</div>'
    +'</div></div>';
}

function sparkline(history){
  if(!history||!history.length) return '';
  var html='<div class="spark-wrap">';
  history.forEach(function(h,i){
    var ht=Math.max(4,Math.round((h.score/100)*28));
    var col=progColor(h.score);
    var isLast=i===history.length-1;
    html+='<div class="spark-bar" style="height:'+ht+'px;background:'+col+';opacity:'+(isLast?1:.6)+'" title="Wk'+h.week+': '+h.score+'"></div>';
  });
  html+='</div>';
  return html;
}

// ── RENDER ─────────────────────────────────────────────────
function render(payload){
  var data = payload.initiatives||[];
  var le   = payload.lastEdit||"";

  if(!data.length){
    document.getElementById("main").innerHTML='<div class="loading" style="color:var(--red)">No data returned. Run the OrbitNext PMO menu from the sheet first.</div>';
    return;
  }

  document.getElementById("ts").textContent = le ? "Updated: "+le : "Live";

  var wk      = weekNum();
  var avgScore= Math.round(data.reduce(function(s,d){return s+(d["Overall Score"]||0);},0)/data.length);
  var avgColor= progColor(avgScore);

  // Count delayed items
  var totalDelayed = 0;
  data.forEach(function(d){
    totalDelayed += (d["_milestones"]||[]).filter(function(m){return m.status==="Delayed";}).length;
    totalDelayed += (d["_deps"]||[]).filter(function(x){return x.status==="Blocked";}).length;
    totalDelayed += (d["_deliverables"]||[]).filter(function(x){return x.status==="Delayed";}).length;
  });

  var html = "";

  // ── PROGRAM OVERVIEW STRIP ──────────────────────────────
  html += '<div class="prog-strip">';
  html += '<div class="prog-cell">'
        + '<div class="prog-cell-label">Program week</div>'
        + '<div class="prog-cell-val" style="color:var(--navy)">'+wk+'</div>'
        + '<div class="prog-cell-sub">of 52 · since May 2026</div>'
        + '</div>';
  html += '<div class="prog-cell">'
        + '<div class="prog-cell-label">Average score</div>'
        + '<div class="prog-cell-val" style="color:'+avgColor+'">'+avgScore+'%</div>'
        + '<div class="prog-cell-sub">across '+data.length+' initiatives</div>'
        + '</div>';
  html += '<div class="prog-cell">'
        + '<div class="prog-cell-label">Delayed / blocked</div>'
        + '<div class="prog-cell-val" style="color:'+(totalDelayed>0?"#C62828":"#2E7D32")+'">'+totalDelayed+'</div>'
        + '<div class="prog-cell-sub">'+(totalDelayed>0?"items need attention":"all clear")+'</div>'
        + '</div>';

  // Status distribution
  var statusCounts = {"On Track":0,"Minor Concerns":0,"Needs Attention":0,"At Risk":0,"Off Track":0};
  data.forEach(function(d){ var s=d["Overall Status"]; if(statusCounts[s]!==undefined) statusCounts[s]++; });
  var worstStatus = ["Off Track","At Risk","Needs Attention","Minor Concerns","On Track"].find(function(s){return statusCounts[s]>0;})||"On Track";
  var wm = sm(worstStatus);
  html += '<div class="prog-cell">'
        + '<div class="prog-cell-label">Program health</div>'
        + '<div class="prog-cell-val" style="font-size:16px;padding-top:4px"><span class="status-pill" style="'+pc(worstStatus)+'">'+worstStatus+'</span></div>'
        + '<div class="prog-cell-sub" style="margin-top:8px">based on lowest initiative</div>'
        + '</div>';
  html += '</div>';

  // ── TREND ───────────────────────────────────────────────
  var maxWeeks=0;
  data.forEach(function(d){var h=d["ScoreHistory"]||[];if(h.length>maxWeeks)maxWeeks=h.length;});

  html += '<div class="section-card">';
  html += '<div class="section-hdr" style="background:linear-gradient(135deg,#1A1D2E,#2B2D42)">'
        + '<div class="section-hdr-left">'
        + '<i class="ti ti-chart-bar" style="color:rgba(255,255,255,.5)"></i>'
        + '<span class="section-hdr-title" style="color:rgba(255,255,255,.9)">How it\'s been going</span>'
        + '</div>'
        + '<span class="section-hdr-badge" style="color:rgba(255,255,255,.5)">Week-by-week composite score</span>'
        + '</div>';
  html += '<div class="section-body">';

  if(maxWeeks===0){
    html += '<div style="color:var(--muted);font-size:14px;font-style:italic">No historical data yet. Scores will appear after the first Apps Script run.</div>';
  } else {
    var weekAvgs=[];
    for(var w=0;w<maxWeeks;w++){
      var sum=0,cnt=0;
      data.forEach(function(d){var h=d["ScoreHistory"]||[];if(h[w]&&h[w].score!=null){sum+=h[w].score;cnt++;}});
      weekAvgs.push(cnt?Math.round(sum/cnt):null);
    }
    var va=weekAvgs.filter(function(v){return v!==null;});
    var la=va.length?va[va.length-1]:0;
    var pa=va.length>1?va[va.length-2]:la;
    var delta=la-pa;
    var dc=delta>0?"#2E7D32":delta<0?"#C62828":"#6B7280";

    html += '<div class="trend-bars">';
    weekAvgs.forEach(function(avg,i){
      var s=avg!==null?avg:0;
      var ht=s>0?Math.max(5,Math.round((s/100)*72)):5;
      var col=avg!==null?progColor(s):"#EEF0F2";
      var isL=i===weekAvgs.length-1;
      html += '<div class="trend-bar-wrap">';
      if(avg!==null) html+='<div class="trend-bar-val" style="color:'+(isL?"var(--navy)":"var(--muted)")+';font-weight:'+(isL?"700":"400")+'">'+s+'%</div>';
      html += '<div class="trend-bar" style="height:'+ht+'px;background:'+col+';opacity:'+(isL?1:.6)+'" title="Wk'+(i+1)+': '+(avg!==null?s+"%":"–")+'"></div>';
      html += '<div class="trend-bar-label">Wk'+(i+1)+'</div>';
      html += '</div>';
    });
    html += '</div>';

    html += '<div class="trend-summary">';
    html += '<div class="trend-stat"><div class="trend-stat-label">Current avg</div><div class="trend-stat-val" style="color:'+progColor(la)+'">'+la+'%</div></div>';
    html += '<div class="trend-stat"><div class="trend-stat-label">vs last week</div><div class="trend-stat-val" style="color:'+dc+'">'+(delta>=0?"+":"")+delta+'%</div></div>';
    html += '<div class="initiative-pills">';
    data.forEach(function(d){
      var score=d["Overall Score"]||0;
      var col=progColor(score);
      var nm=(d["Initiative"]||"").replace(/^I\d+\s*-\s*/,"").trim();
      if(nm.length>16) nm=nm.substring(0,16)+"…";
      html += '<div class="init-pill">'
            + '<div class="init-pill-dot" style="background:'+col+'"></div>'
            + '<span class="init-pill-name">'+nm+'</span>'
            + '<span class="init-pill-score" style="color:'+col+'">'+score+'%</span>'
            + '</div>';
    });
    html += '</div></div>';
  }
  html += '</div></div>';

  // ── WHAT HAS DELAYED ────────────────────────────────────
  var delRows = {milestone:[], dependency:[], deliverable:[]};
  data.forEach(function(d){
    var nm=(d["Initiative"]||"").replace(/^I\d+\s*-\s*/,"").trim();
    var dot=sm(d["Overall Status"]||"").dot;
    (d["_milestones"]||[]).filter(function(x){return x.status==="Delayed";}).forEach(function(m){
      delRows.milestone.push({name:m.name,detail:"End: "+m.end+(m.priority?" · "+m.priority+" priority":""),init:nm,dot:"#C62828"});
    });
    (d["_deps"]||[]).filter(function(x){return x.status==="Blocked";}).forEach(function(dep){
      delRows.dependency.push({name:dep.name,detail:"Provider: "+(dep.provider||"?")+" · "+dep.priority+" priority",init:nm,dot:"#B71C1C"});
    });
    (d["_deliverables"]||[]).filter(function(x){return x.status==="Delayed";}).forEach(function(dl){
      delRows.deliverable.push({name:dl.name,detail:"Target: "+(dl.targetDate||"?"),init:nm,dot:"#E65100"});
    });
  });
  var totalDel = delRows.milestone.length+delRows.dependency.length+delRows.deliverable.length;

  html += '<div class="section-card">';
  html += '<div class="section-hdr" style="background:linear-gradient(135deg,#4A0000,#7A1518)">'
        + '<div class="section-hdr-left">'
        + '<i class="ti ti-alert-triangle" style="color:rgba(255,255,255,.5)"></i>'
        + '<span class="section-hdr-title" style="color:rgba(255,255,255,.9)">What has delayed</span>'
        + '</div>'
        + '<span class="section-hdr-badge" style="color:rgba(255,255,255,.5)">'+totalDel+' item'+(totalDel!==1?"s":"")+'</span>'
        + '</div>';
  html += '<div class="section-body">';
  if(!totalDel){
    html += '<div class="all-clear"><i class="ti ti-circle-check"></i>Nothing delayed or blocked right now.</div>';
  } else {
    var typeConf = [
      {key:"milestone",  label:"Delayed milestones",    icon:"ti-flag-2",  color:"#C62828", border:"#FFCDD2", stripe:"#FFF5F5"},
      {key:"dependency", label:"Blocked dependencies",  icon:"ti-link",    color:"#B71C1C", border:"#FFCDD2", stripe:"#FFF5F5"},
      {key:"deliverable",label:"Delayed deliverables",  icon:"ti-package", color:"#E65100", border:"#FFE0B2", stripe:"#FFF8F0"}
    ];
    typeConf.forEach(function(tc){
      var rows=delRows[tc.key]; if(!rows.length) return;
      html += '<div class="delayed-group">';
      html += '<div class="delayed-group-title"><i class="ti '+tc.icon+'" style="color:'+tc.color+'"></i><span style="color:'+tc.color+'">'+tc.label+' ('+rows.length+')</span></div>';
      html += '<div class="delayed-list" style="border:1px solid '+tc.border+'">';
      rows.forEach(function(r,i){
        var bg=i%2===0?"#fff":tc.stripe;
        html += '<div class="delayed-row" style="background:'+bg+';border-bottom-color:'+tc.border+'">'
              + '<div class="delayed-dot" style="background:'+r.dot+'"></div>'
              + '<div style="flex:1;min-width:0">'
              + '<div class="delayed-name">'+r.name+'</div>'
              + '<div class="delayed-detail">'+r.detail+'</div>'
              + '</div>'
              + '<div class="init-tag" style="background:'+r.dot+'">'+r.init+'</div>'
              + '</div>';
      });
      html += '</div></div>';
    });
  }
  html += '</div></div>';

  // ── UPCOMING ────────────────────────────────────────────
  var now=new Date(); now.setHours(0,0,0,0);
  var cutoff=new Date(now.getTime()+14*24*60*60*1000);
  var upcoming=[];
  var months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  var statusDot={"In Progress":"#1565C0","Not Started":"#9b9fad","On Hold":"#F9A825"};

  data.forEach(function(d){
    var nm=(d["Initiative"]||"").replace(/^I\d+\s*-\s*/,"").trim();
    (d["_milestones"]||[]).forEach(function(m){
      if(m.status==="Completed"||m.status==="Delayed") return;
      var dt=parseDate(m.end); if(!dt) return;
      if(dt>=now&&dt<=cutoff) upcoming.push({name:m.name,init:nm,date:dt,status:m.status,priority:m.priority||""});
    });
  });
  upcoming.sort(function(a,b){return a.date-b.date;});

  html += '<div class="section-card">';
  html += '<div class="section-hdr" style="background:linear-gradient(135deg,#1B5E20,#2E7D32)">'
        + '<div class="section-hdr-left">'
        + '<i class="ti ti-calendar-event" style="color:rgba(255,255,255,.5)"></i>'
        + '<span class="section-hdr-title" style="color:rgba(255,255,255,.9)">What\'s coming up — next 2 weeks</span>'
        + '</div>'
        + '<span class="section-hdr-badge" style="color:rgba(255,255,255,.5)">'+upcoming.length+' milestone'+(upcoming.length!==1?"s":"")+'</span>'
        + '</div>';
  html += '<div class="section-body">';
  if(!upcoming.length){
    html += '<div class="no-upcoming">No milestones due in the next 2 weeks.</div>';
  } else {
    html += '<div class="upcoming-list">';
    upcoming.forEach(function(r,i){
      var dL=Math.round((r.date-now)/(24*60*60*1000));
      var urg=dL<=3?"#C62828":dL<=7?"#E65100":"#1565C0";
      var dot=statusDot[r.status]||"#9b9fad";
      var bg=i%2===0?"#fff":"#F1F8F1";
      html += '<div class="upcoming-row" style="background:'+bg+'">'
            + '<div class="upcoming-date-box" style="background:'+urg+'18;border-color:'+urg+'44;color:'+urg+'">'
            + '<div class="upcoming-date-day">'+r.date.getDate()+'</div>'
            + '<div class="upcoming-date-mon">'+months[r.date.getMonth()]+'</div>'
            + '</div>'
            + '<div style="flex:1;min-width:0">'
            + '<div class="upcoming-name">'+r.name+'</div>'
            + '<div class="upcoming-meta"><div class="upcoming-meta-dot" style="background:'+dot+'"></div>'+r.status+(r.priority?" · "+r.priority+" priority":"")+'</div>'
            + '</div>'
            + '<div class="upcoming-right">'
            + '<div class="init-tag" style="background:#2E7D32">'+r.init+'</div>'
            + '<div class="upcoming-days" style="color:'+urg+'">'+(dL===0?"Today":dL===1?"Tomorrow":"in "+dL+" days")+'</div>'
            + '</div>'
            + '</div>';
    });
    html += '</div>';
  }
  html += '</div></div>';

  // ── INITIATIVE CARDS ────────────────────────────────────
  html += '<div class="cards">';
  data.forEach(function(d){
    var status  = d["Overall Status"]||"Needs Attention";
    var score   = d["Overall Score"]||0;
    var m       = sm(status);
    var color   = progColor(score);
    var iname   = d["Initiative"]||"";
    var dispName= iname.replace(/^I\d+\s*-\s*/,"").trim();
    var owners  = d["Owners"]||"";
    var timeline= d["Timeline"]||"";
    var trend   = d["Trend"]||"stable";
    var weeksAt = d["WeeksAtStatus"]||1;
    var history = d["ScoreHistory"]||[];

    var msScore  = d["MilestoneScore"]||0;
    var metScore = d["MetricsScore"]||0;
    var base     = d["BaseScore"]||0;
    var delAdj   = d["DeliverableAdj"]||0;
    var depAdj   = d["DependencyAdj"]||0;
    var budAdj   = d["BudgetAdj"]||0;

    var wk = weekNum();

    html += '<div class="icard">';
    html += '<div class="icard-accent" style="background:'+color+'"></div>';

    // Top
    html += '<div class="icard-top">';
    html += '<div class="icard-left">'
          + '<div class="icard-name">'+dispName+'</div>'
          + '<div class="icard-meta">'
          + '<span style="display:flex;align-items:center;gap:4px"><i class="ti ti-users"></i>'+owners+'</span>'
          + '<span style="color:#ccc">·</span>'
          + '<span style="display:flex;align-items:center;gap:4px"><i class="ti ti-calendar"></i>'+timeline+' · Week '+wk+'</span>'
          + '</div>'
          + '</div>';

    html += '<div class="icard-right">'
          + scoreRing(score, color)
          + '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">'
          + '<span class="status-pill" style="'+pc(status)+'">'+status+'</span>'
          + '<div style="display:flex;align-items:center;gap:8px">'
          + trendArrow(trend)
          + '<span style="font-size:12px;color:var(--muted)">'+weeksAt+' wk'+(weeksAt!==1?"s":"")+'</span>'
          + '</div>'
          + sparkline(history)
          + '</div>'
          + '</div>';
    html += '</div>'; // icard-top

    // Breakdown bar
    html += '<div class="icard-breakdown">';

    // Milestones
    html += '<div class="bd-item">'
          + '<div class="bd-label">Milestones</div>'
          + '<div class="bd-val" style="color:'+progColor(msScore)+'">'+msScore+'%</div>'
          + '<div class="bd-sub">70% of base</div>'
          + '<div class="bd-bar"><div class="bd-bar-fill" style="width:'+msScore+'%;background:'+progColor(msScore)+'"></div></div>'
          + '</div>';

    // Metrics
    html += '<div class="bd-item">'
          + '<div class="bd-label">Metrics</div>'
          + '<div class="bd-val" style="color:'+progColor(metScore)+'">'+metScore+'%</div>'
          + '<div class="bd-sub">30% of base</div>'
          + '<div class="bd-bar"><div class="bd-bar-fill" style="width:'+metScore+'%;background:'+progColor(metScore)+'"></div></div>'
          + '</div>';

    // Base
    html += '<div class="bd-item">'
          + '<div class="bd-label">Base score</div>'
          + '<div class="bd-val" style="color:'+progColor(base)+'">'+base+'%</div>'
          + '<div class="bd-sub">before adjustments</div>'
          + '<div class="bd-bar"><div class="bd-bar-fill" style="width:'+base+'%;background:'+progColor(base)+'"></div></div>'
          + '</div>';

    // Deliverables adj
    html += '<div class="bd-item">'
          + '<div class="bd-label">Deliverables</div>'
          + '<div class="bd-val '+adjClass(delAdj)+'">'+adjStr(delAdj)+'</div>'
          + '<div class="bd-sub">adjustment</div>'
          + '</div>';

    // Dependencies adj
    html += '<div class="bd-item">'
          + '<div class="bd-label">Dependencies</div>'
          + '<div class="bd-val '+adjClass(depAdj)+'">'+adjStr(depAdj)+'</div>'
          + '<div class="bd-sub">adjustment</div>'
          + '</div>';

    // Budget adj
    html += '<div class="bd-item">'
          + '<div class="bd-label">Budget</div>'
          + '<div class="bd-val '+adjClass(budAdj)+'">'+adjStr(budAdj)+'</div>'
          + '<div class="bd-sub">adjustment</div>'
          + '</div>';

    html += '</div>'; // icard-breakdown
    html += '</div>'; // icard
  });
  html += '</div>'; // cards

  document.getElementById("main").innerHTML = html;
}

function loadData(){
  document.getElementById("ts").textContent = "Refreshing...";
  document.getElementById("main").innerHTML = '<div class="loading"><div class="spinner"></div>Loading initiative data...</div>';
  fetch(DATA_URL)
    .then(function(r){ return r.json(); })
    .then(function(p){ render(p); })
    .catch(function(err){
      document.getElementById("main").innerHTML =
        '<div class="loading" style="color:var(--red)">Error: '+err.message+'</div>';
    });
}

window.onload = loadData;
</script>
</body>
</html>
