<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>OrbitNext 2.0</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
:root{
  --red:#AB1E23;--red2:#7A1518;--navy:#2B2D42;
  --bg:#F0F2F5;--card:#fff;--border:#E2E6EA;--text:#1A1D2E;--muted:#6B7280;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.6;min-height:100vh}

.hdr{background:#fff;border-bottom:1px solid var(--border);padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:68px;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.hdr-logos{display:flex;align-items:center;gap:16px}
.hdr-logos img{height:40px;width:auto}
.hdr-divider{width:1px;height:28px;background:var(--border)}
.hdr-center{text-align:center}
.hdr-title{font-size:14px;font-weight:700;color:var(--navy);letter-spacing:.02em}
.hdr-tag{font-size:12px;color:var(--muted);margin-top:1px;font-style:italic}
.hdr-right{display:flex;align-items:center;gap:12px}
.ts-wrap{font-size:12px;color:var(--muted);background:#f7f8fa;padding:6px 12px;border-radius:8px;border:1px solid var(--border);display:flex;align-items:center;gap:6px}
.rbtn{background:var(--red);color:#fff;border:none;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px}
.rbtn:hover{background:var(--red2)}

.main{padding:28px 32px;max-width:1280px;margin:0 auto}

/* LEGEND */
.legend-card{background:#fff;border-radius:14px;border:1px solid var(--border);padding:18px 24px;margin-bottom:20px;box-shadow:0 2px 6px rgba(0,0,0,.04)}
.legend-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.legend-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px}
.legend-block-title{font-size:11px;font-weight:700;color:var(--navy);margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em}
.legend-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:13px}
.legend-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.legend-label{color:var(--navy);font-weight:500;min-width:120px}
.legend-range{color:var(--muted);font-family:'DM Mono',monospace;font-size:12px}
.legend-explain{font-size:12px;color:var(--muted);line-height:1.6;background:#f7f8fa;border-radius:8px;padding:10px 12px}

/* TOP STRIP */
.top-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px}
.strip-cell{background:#fff;border-radius:14px;border:1px solid var(--border);padding:18px 22px;box-shadow:0 2px 6px rgba(0,0,0,.04)}
.strip-cell.clickable{cursor:pointer;transition:box-shadow .15s}
.strip-cell.clickable:hover{box-shadow:0 4px 14px rgba(0,0,0,.1)}
.strip-lbl{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
.strip-val{font-size:30px;font-weight:700;font-family:'DM Mono',monospace}
.strip-sub{font-size:12px;color:var(--muted);margin-top:3px}
.s-pill{display:inline-block;font-size:12px;font-weight:700;padding:5px 14px;border-radius:99px;border:1px solid;letter-spacing:.02em}

/* SECTION CARDS */
.sec-card{background:#fff;border-radius:16px;border:1px solid var(--border);overflow:hidden;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 22px;border-bottom:1px solid var(--border)}
.sec-hdr-l{display:flex;align-items:center;gap:8px}
.sec-hdr-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.sec-hdr-badge{font-size:12px;opacity:.7}
.sec-body{padding:22px 24px}

/* TREND GRID */
.trend-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.trend-track{background:#fafbfc;border:1px solid var(--border);border-radius:12px;padding:16px 18px}
.trend-track-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.trend-track-name{font-size:13px;font-weight:700;color:var(--navy)}
.trend-bars-wrap{display:flex;align-items:flex-end;gap:8px;height:80px}
.t-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;justify-content:flex-end}
.t-bar{width:100%;border-radius:4px 4px 0 0;min-height:4px;transition:opacity .15s;cursor:default}
.t-bar-val{font-size:10px;font-family:'DM Mono',monospace;font-weight:600}
.t-bar-lbl{font-size:9px;color:var(--muted);font-family:'DM Mono',monospace}
.no-trend{font-size:12px;color:var(--muted);font-style:italic;padding:20px 0;text-align:center}

/* DELAYED */
.del-group{margin-bottom:16px}
.del-group:last-child{margin-bottom:0}
.del-list{border-radius:10px;overflow:hidden}
.del-row{display:flex;align-items:center;gap:12px;padding:11px 15px;border-bottom:1px solid}
.del-row:last-child{border-bottom:none}
.del-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.del-name-text{font-size:13px;font-weight:600;color:var(--navy);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.del-detail{font-size:12px;color:var(--muted);margin-top:1px}
.init-tag{font-size:11px;font-weight:600;color:#fff;padding:2px 9px;border-radius:99px;white-space:nowrap;flex-shrink:0}
.all-clear{display:flex;align-items:center;gap:10px;color:#2E7D32;font-size:14px;font-weight:500}

/* UPCOMING */
.up-list{border:1px solid #C8E6C9;border-radius:10px;overflow:hidden}
.up-row{display:flex;align-items:center;gap:14px;padding:11px 15px;border-bottom:1px solid #C8E6C9}
.up-row:last-child{border-bottom:none}
.up-date{min-width:52px;text-align:center;border-radius:9px;padding:5px 7px;border:1px solid}
.up-date-d{font-size:18px;font-weight:700;font-family:'DM Mono',monospace;line-height:1}
.up-date-m{font-size:10px;text-transform:uppercase}
.up-name{flex:1;min-width:0;font-size:13px;font-weight:600;color:var(--navy)}
.up-meta{font-size:12px;color:var(--muted);margin-top:2px;display:flex;align-items:center;gap:5px}
.up-days{font-size:11px;font-weight:700}

/* TRACK CARDS */
.tracks{display:flex;flex-direction:column;gap:20px}
.tcard{background:#fff;border-radius:16px;border:1px solid var(--border);overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.tcard-accent{height:4px}
.tcard-top{display:grid;grid-template-columns:1fr auto;gap:24px;padding:22px 24px 18px;border-bottom:1px solid var(--border)}
.tcard-name{font-size:20px;font-weight:700;color:var(--navy);margin-bottom:8px}
.tcard-person-row{display:flex;align-items:flex-start;gap:6px;font-size:13px;color:var(--muted);margin-bottom:4px}
.tcard-person-row i{font-size:13px;margin-top:2px;flex-shrink:0;color:var(--muted)}
.tcard-person-label{font-weight:600;color:var(--navy);margin-right:4px;flex-shrink:0}
.tcard-right{display:flex;flex-direction:column;align-items:flex-end;gap:10px;min-width:200px}

/* SCORE RING */
.score-ring{position:relative;width:80px;height:80px;cursor:pointer;transition:transform .15s}
.score-ring:hover{transform:scale(1.05)}
.score-ring svg{transform:rotate(-90deg)}
.score-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.score-num{font-size:20px;font-weight:700;font-family:'DM Mono',monospace;line-height:1;color:var(--navy)}
.score-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;margin-top:2px}
.score-hint{font-size:10px;color:var(--muted);text-decoration:underline dotted;cursor:pointer;margin-top:2px}

.spark-row{display:flex;align-items:flex-end;gap:3px;height:24px}
.spark-b{border-radius:2px 2px 0 0;min-height:3px}
.t-up{color:#2E7D32;font-weight:600;font-size:12px;display:inline-flex;align-items:center;gap:3px}
.t-dn{color:#C62828;font-weight:600;font-size:12px;display:inline-flex;align-items:center;gap:3px}
.t-st{color:var(--muted);font-weight:600;font-size:12px;display:inline-flex;align-items:center;gap:3px}

/* CARD BODY */
.tcard-body{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--border)}
.tcard-section{padding:18px 20px;border-right:1px solid var(--border)}
.tcard-section:last-child{border-right:none}
.tsec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.tsec-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;display:flex;align-items:center;gap:6px}
.tsec-badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px}
.ms-prog-bar{height:6px;background:#EEF0F2;border-radius:99px;overflow:hidden;margin:8px 0 12px}
.ms-prog-fill{height:100%;border-radius:99px}
.ms-counts{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.ms-count-btn{display:flex;align-items:center;gap:7px;padding:8px 10px;border-radius:8px;border:1px solid var(--border);cursor:pointer;background:#fafbfc;font-size:13px;transition:background .15s}
.ms-count-btn:hover{background:#e8eaf0}
.ms-count-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ms-count-label{color:var(--muted);flex:1}
.ms-count-val{font-weight:700;font-family:'DM Mono',monospace;color:var(--navy)}

/* METRICS */
.metric-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #f3f4f6}
.metric-row:last-child{border-bottom:none}
.metric-name{flex:1;font-size:13px;color:var(--navy);font-weight:500}
.metric-not-entered{font-size:11px;color:#9b9fad;font-style:italic}
.metric-bar{height:5px;background:#EEF0F2;border-radius:99px;overflow:hidden;width:80px}
.metric-bar-fill{height:100%;border-radius:99px}

/* BUDGET */
.bud-summary{display:flex;gap:12px;margin-bottom:12px}
.bud-stat{flex:1;background:#fafbfc;border:1px solid var(--border);border-radius:10px;padding:12px 14px}
.bud-stat-label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.bud-stat-val{font-size:18px;font-weight:700;font-family:'DM Mono',monospace;color:var(--navy)}
.bud-stat-cur{font-size:11px;color:var(--muted);margin-top:2px}
.tcard-body-three{display:grid;grid-template-columns:1fr 1fr 1fr;border-bottom:1px solid var(--border)}

/* POPUP */
.overlay{display:none;position:fixed;inset:0;background:rgba(15,17,30,.5);z-index:200;align-items:flex-start;justify-content:center;padding-top:72px;backdrop-filter:blur(2px)}
.overlay.open{display:flex}
.popup{background:#fff;border-radius:16px;width:92%;max-width:540px;box-shadow:0 24px 64px rgba(0,0,0,.2);max-height:82vh;overflow:hidden;display:flex;flex-direction:column}
.popup-hdr{padding:20px 24px 16px;border-bottom:1px solid var(--border);flex-shrink:0;position:relative}
.popup-track{font-size:11px;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.popup-title{font-size:16px;font-weight:700;color:var(--navy)}
.popup-sub{font-size:12px;color:var(--muted);margin-top:2px}
.popup-close{position:absolute;top:16px;right:20px;background:none;border:none;font-size:18px;color:var(--muted);cursor:pointer;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.popup-close:hover{background:#f5f5f5;color:var(--red)}
.popup-body{padding:16px 24px;overflow-y:auto;flex:1}
.popup-row{display:flex;align-items:flex-start;gap:10px;padding:11px 0;border-bottom:.5px solid var(--border)}
.popup-row:last-child{border-bottom:none}
.popup-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
.popup-name{font-size:13px;font-weight:600;color:var(--navy)}
.popup-meta{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.6}
.popup-notes{font-size:12px;color:#444;margin-top:6px;background:#f7f8fa;border-radius:6px;padding:7px 10px;border-left:3px solid #ddd;line-height:1.5}
.popup-st{font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;flex-shrink:0;white-space:nowrap;border:1px solid}

/* AI WHY POPUP */
.ai-why-body{padding:20px 24px}
.ai-why-loading{display:flex;align-items:center;gap:12px;color:var(--muted);font-size:14px;padding:10px 0}
.ai-why-spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
.ai-why-text{font-size:14px;color:var(--text);line-height:1.8;white-space:pre-wrap}
.ai-why-signals{margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}
.ai-why-signal-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.ai-signal-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #f3f4f6;font-size:13px}
.ai-signal-row:last-child{border-bottom:none}
.ai-signal-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

@keyframes spin{to{transform:rotate(360deg)}}
.loading{text-align:center;padding:80px 20px;color:var(--muted);font-size:14px}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
.footer{text-align:center;padding:28px;font-size:12px;color:var(--muted);border-top:1px solid var(--border);margin-top:8px}
.footer a{color:var(--red);text-decoration:none}
@media(max-width:900px){.main{padding:16px}.top-strip,.legend-grid,.trend-grid,.tcard-body,.tcard-body-three{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-logos">
    <img src="https://mekhanil1055.github.io/orbitnext-dashboard/OrbitNext%20Logo.png" alt="OrbitNext" onerror="this.style.display='none'">
    <div class="hdr-divider"></div>
    <img src="https://mekhanil1055.github.io/orbitnext-dashboard/inapp-logo.png" alt="InApp" onerror="this.style.display='none'">
  </div>
  <div class="hdr-center">
    <div class="hdr-title">OrbitNext 2.0 — Initiative Tracker</div>
    <div class="hdr-tag">One Team. One Mission. One Leap Forward.</div>
  </div>
  <div class="hdr-right">
    <div class="ts-wrap"><i class="ti ti-clock" style="color:var(--red);font-size:13px"></i><span id="ts">Loading...</span></div>
    <button class="rbtn" onclick="loadData()"><i class="ti ti-refresh"></i>Refresh</button>
  </div>
</div>

<div class="main" id="main">
  <div class="loading"><div class="spinner"></div>Loading initiative data...</div>
</div>

<div class="footer">OrbitNext 2.0 &middot; InApp Information Technologies &middot; <a href="https://www.inapp.com" target="_blank">inapp.com</a> &middot; Data sourced live from Google Sheets</div>

<!-- POPUP (milestones / deliverables) -->
<div class="overlay" id="overlay" onclick="if(event.target===this)closePopup()">
  <div class="popup">
    <div class="popup-hdr">
      <div class="popup-track" id="pop-track"></div>
      <div class="popup-title" id="pop-title"></div>
      <div class="popup-sub" id="pop-sub"></div>
      <button class="popup-close" onclick="closePopup()">&#10005;</button>
    </div>
    <div class="popup-body" id="pop-body"></div>
  </div>
</div>

<!-- AI WHY POPUP -->
<div class="overlay" id="ai-overlay" onclick="if(event.target===this)closeAiPopup()">
  <div class="popup">
    <div class="popup-hdr">
      <div class="popup-track" id="ai-pop-track"></div>
      <div class="popup-title" id="ai-pop-title">Score Analysis</div>
      <div class="popup-sub" id="ai-pop-sub"></div>
      <button class="popup-close" onclick="closeAiPopup()">&#10005;</button>
    </div>
    <div class="ai-why-body" id="ai-pop-body">
      <div class="ai-why-loading"><div class="ai-why-spinner"></div>Analysing initiative data...</div>
    </div>
  </div>
</div>

<script>
var DATA_URL = "https://script.google.com/macros/s/AKfycbwgkS45kGFl1s-8z-W2nFdO4YQYEE-I3DbM2XbZ5G4sQUsA6uJaxu3X6GNTg5LZJmBvWg/exec?serve=data";
var PROGRAM_START = new Date("2026-05-01");
var TOTAL_WEEKS = 52;
var D = [];

var SDOT = {"Completed":"#2E7D32","In Progress":"#1565C0","Not Started":"#9b9fad","On Hold":"#F9A825","Delayed":"#C62828","Pending":"#E65100","Blocked":"#B71C1C","Resolved":"#2E7D32"};
var STATUS_CFG = {
  "On Track":       {dot:"#2E7D32",bg:"#E8F5E9",border:"#A5D6A7",text:"#2E7D32"},
  "Minor Concerns": {dot:"#F9A825",bg:"#FFFDE7",border:"#F9A825",text:"#7A6000"},
  "Needs Attention":{dot:"#FB8C00",bg:"#FFF3E0",border:"#FB8C00",text:"#BF5000"},
  "At Risk":        {dot:"#EF5350",bg:"#FFEBEE",border:"#EF9A9A",text:"#C62828"},
  "Off Track":      {dot:"#B71C1C",bg:"#FCE4E4",border:"#B71C1C",text:"#4A0000"}
};

function sc(s){return STATUS_CFG[s]||STATUS_CFG["Needs Attention"];}
function pillHtml(s){var c=sc(s);return '<span class="s-pill" style="background:'+c.bg+';color:'+c.text+';border-color:'+c.border+'">'+s+'</span>';}
function progColor(p){return p>=85?"#2E7D32":p>=70?"#F9A825":p>=50?"#FB8C00":p>=30?"#EF5350":"#B71C1C";}
function weekNum(){return Math.floor((new Date()-PROGRAM_START)/604800000)+1;}
function parseDate(str){if(!str)return null;str=(str+"").trim();var m=str.match(/^(\d{4})-(\d{2})-(\d{2})/);if(m)return new Date(+m[1],+m[2]-1,+m[3]);m=str.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})/);if(m)return new Date(+m[3],+m[2]-1,+m[1]);var d=new Date(str);return isNaN(d)?null:d;}
function fmt(n){if(!n&&n!==0)return "–";if(typeof n==="string")n=parseFloat(n.replace(/[^0-9.\-]/g,""));if(isNaN(n))return "–";return n>=1000000?(n/1000000).toFixed(1)+"M":n>=1000?(n/1000).toFixed(0)+"K":String(Math.round(n));}
function trendArrow(t){if(t==="up")return '<span class="t-up"><i class="ti ti-trending-up"></i>Improving</span>';if(t==="down")return '<span class="t-dn"><i class="ti ti-trending-down"></i>Declining</span>';return '<span class="t-st"><i class="ti ti-minus"></i>Stable</span>';}

function scoreRing(score,color,dIdx){
  var r=34,circ=2*Math.PI*r,dash=circ*(score/100),gap=circ-dash;
  return '<div class="score-ring" onclick="showAiWhy('+dIdx+')" title="Click for score analysis">'
    +'<svg width="80" height="80" viewBox="0 0 80 80"><circle cx="40" cy="40" r="'+r+'" fill="none" stroke="#EEF0F2" stroke-width="6"/>'
    +'<circle cx="40" cy="40" r="'+r+'" fill="none" stroke="'+color+'" stroke-width="6" stroke-dasharray="'+dash+' '+gap+'" stroke-linecap="round"/></svg>'
    +'<div class="score-inner"><div class="score-num">'+score+'</div><div class="score-lbl" style="text-decoration:underline dotted;cursor:pointer">Why?</div></div></div>';
}

function sparkline(history){
  if(!history||!history.length)return '';
  var h='<div class="spark-row">';
  history.forEach(function(e,i){var ht=Math.max(3,Math.round((e.score/100)*22));h+='<div class="spark-b" style="height:'+ht+'px;width:10px;background:'+progColor(e.score)+';opacity:'+(i===history.length-1?1:.55)+'" title="Wk'+e.week+': '+e.score+'"></div>';});
  return h+'</div>';
}

// ── AI WHY (calls Anthropic API) ────────────────────────────
function showAiWhy(dIdx){
  var d=D[dIdx]; if(!d) return;
  var name=(d["Initiative"]||"").replace(/^I\d+\s*-\s*/,"").trim();
  var score=d["Overall Score"]||0;
  var status=d["Overall Status"]||"";

  document.getElementById("ai-pop-track").textContent=name;
  document.getElementById("ai-pop-title").textContent="Score Analysis — "+score+"/100";
  document.getElementById("ai-pop-sub").textContent=status;
  document.getElementById("ai-pop-body").innerHTML='<div class="ai-why-loading"><div class="ai-why-spinner"></div>Analysing initiative data...</div>';
  document.getElementById("ai-overlay").classList.add("open");

  // Build data signals for AI
  var ms=d["_milestones"]||[];
  var msDl=ms.filter(function(m){return m.status==="Delayed";});
  var msIP=ms.filter(function(m){return m.status==="In Progress";});
  var msDone=ms.filter(function(m){return m.status==="Completed";});
  var metrics=d["_metrics"]||[];
  var metMissing=metrics.filter(function(m){return !m.actual||m.actual.trim()==="";});
  var metEntered=metrics.filter(function(m){return m.actual&&m.actual.trim()!==""});
  var deps=d["_deps"]||[];
  var depsBlocked=deps.filter(function(dep){return dep.status==="Blocked";});
  var depsPending=deps.filter(function(dep){return dep.status==="Pending"&&dep.priority==="High";});
  var delivs=d["_deliverables"]||[];
  var delivsDl=delivs.filter(function(dl){return dl.status==="Delayed";});

  var promptData="Initiative: "+name+"\nScore: "+score+"/100\nStatus: "+status+"\n";
  promptData+="Timeline: "+(d["Timeline"]||"?")+" | Week: "+weekNum()+" of "+TOTAL_WEEKS+"\n\n";
  promptData+="MILESTONES ("+ms.length+" total):\n";
  promptData+="- Completed: "+msDone.length+"\n";
  promptData+="- In Progress: "+msIP.length+"\n";
  promptData+="- Delayed: "+msDl.length+"\n";
  if(msDl.length) promptData+="  Delayed items: "+msDl.map(function(m){return m.name+(m.notes?" ["+m.notes+"]":"");}).join("; ")+"\n";
  if(msIP.length) promptData+="  In Progress: "+msIP.map(function(m){return m.name+(m.notes?" ["+m.notes+"]":"");}).join("; ")+"\n";

  promptData+="\nSUCCESS METRICS ("+metrics.length+" total):\n";
  metEntered.forEach(function(m){promptData+="- "+m.name+": target="+m.target+", actual="+m.actual+" ("+m.unit+")\n";});
  if(metMissing.length) promptData+="- "+metMissing.length+" metric"+(metMissing.length>1?"s":"")+" have no actuals yet: "+metMissing.map(function(m){return m.name;}).join(", ")+"\n";

  if(deps.length){
    promptData+="\nDEPENDENCIES:\n";
    if(depsBlocked.length) promptData+="- BLOCKED: "+depsBlocked.map(function(d){return d.name+" (provider: "+d.provider+")";}).join("; ")+"\n";
    if(depsPending.length) promptData+="- High priority pending: "+depsPending.map(function(d){return d.name;}).join("; ")+"\n";
  }

  if(delivs.length){
    promptData+="\nDELIVERABLES:\n";
    if(delivsDl.length) promptData+="- Delayed: "+delivsDl.map(function(dl){return dl.name;}).join("; ")+"\n";
  }

  promptData+="\nSCORE COMPONENTS:\n";
  promptData+="- Milestone score: "+d["MilestoneScore"]+"% (70% of base)\n";
  promptData+="- Metrics score: "+d["MetricsScore"]+"% (30% of base)\n";
  promptData+="- Base score: "+d["BaseScore"]+"%\n";
  promptData+="- Deliverable adjustment: "+(d["DeliverableAdj"]||0)+" pts\n";
  promptData+="- Dependency adjustment: "+(d["DependencyAdj"]||0)+" pts\n";
  promptData+="- Budget adjustment: "+(d["BudgetAdj"]||0)+" pts\n";

  var trend=d["Trend"]||"stable";
  var history=d["ScoreHistory"]||[];
  if(history.length>1){
    promptData+="\nSCORE HISTORY: "+history.map(function(h){return "Wk"+h.week+":"+h.score;}).join(", ")+"\n";
    promptData+="Trend: "+trend+"\n";
  }

  var systemPrompt="You are a PMO analyst reviewing an OrbitNext 2.0 initiative tracker for InApp, an IT services company targeting 25M to 50M USD revenue growth. Your role is to give a concise, contextual explanation of why an initiative has its current score — written for a CEO and leadership team, not a technical audience. Be direct, specific, and use the actual milestone names and metric names from the data. Do not explain the scoring formula. Do not say things like 'based on the data'. Write 3-4 sentences maximum. Focus on what is actually happening — what is done, what is stuck, what is missing, and what the risk is if nothing changes.";

  var APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwgkS45kGFl1s-8z-W2nFdO4YQYEE-I3DbM2XbZ5G4sQUsA6uJaxu3X6GNTg5LZJmBvWg/exec";

  var whyUrl = APPS_SCRIPT_URL + "?serve=why&prompt=" + encodeURIComponent(promptData);

  fetch(whyUrl, { redirect: "follow" })
  .then(function(r){ return r.json(); })
  .then(function(r){
    var text = r.text || "Unable to generate analysis.";

    // Build signals list
    var signals=[];
    if(msDl.length) msDl.forEach(function(m){signals.push({label:m.name,sub:"Milestone — delayed"+(m.notes?" · "+m.notes:""),color:"#C62828"});});
    if(depsBlocked.length) depsBlocked.forEach(function(dep){signals.push({label:dep.name,sub:"Dependency blocked · Provider: "+dep.provider,color:"#B71C1C"});});
    if(delivsDl.length) delivsDl.forEach(function(dl){signals.push({label:dl.name,sub:"Deliverable delayed",color:"#E65100"});});
    if(metMissing.length) metMissing.forEach(function(m){signals.push({label:m.name,sub:"Metric — no actual entered",color:"#9b9fad"});});

    var html='<div class="ai-why-text">'+escHtml(text)+'</div>';
    if(signals.length){
      html+='<div class="ai-why-signals"><div class="ai-why-signal-title">Flagged items</div>';
      signals.forEach(function(s){
        html+='<div class="ai-signal-row"><div class="ai-signal-dot" style="background:'+s.color+'"></div>'
             +'<div><div style="font-size:13px;font-weight:600;color:var(--navy)">'+escHtml(s.label)+'</div>'
             +'<div style="font-size:12px;color:var(--muted)">'+escHtml(s.sub)+'</div></div></div>';
      });
      html+='</div>';
    }
    document.getElementById("ai-pop-body").innerHTML=html;
  })
  .catch(function(err){
    document.getElementById("ai-pop-body").innerHTML='<div style="color:#C62828;font-size:13px">Could not load analysis: '+err.message+'</div>';
  });
}
function closeAiPopup(){document.getElementById("ai-overlay").classList.remove("open");}
function escHtml(s){return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

// ── POPUP ────────────────────────────────────────────────────
function openPopup(trackName,title,sub,rows){
  document.getElementById("pop-track").textContent=trackName;
  document.getElementById("pop-title").textContent=title;
  document.getElementById("pop-sub").textContent=sub;
  var html="";
  rows.forEach(function(r){
    var dot=SDOT[r.status]||"#9b9fad";
    var cfg=STATUS_CFG[r.status]||{bg:dot+"22",border:dot+"44",text:dot};
    html+='<div class="popup-row"><div class="popup-dot" style="background:'+dot+'"></div>'
         +'<div style="flex:1"><div class="popup-name">'+escHtml(r.name)+'</div>'
         +'<div class="popup-meta">'+escHtml(r.meta)+'</div>'
         +(r.notes?'<div class="popup-notes"><i class="ti ti-notes" style="font-size:11px;margin-right:4px"></i>'+escHtml(r.notes)+'</div>':'')
         +'</div>'
         +'<span class="popup-st" style="background:'+cfg.bg+';color:'+cfg.text+';border-color:'+cfg.border+'">'+r.status+'</span></div>';
  });
  if(!html) html='<div style="color:var(--muted);font-size:13px;padding:16px 0;text-align:center">No items in this category.</div>';
  document.getElementById("pop-body").innerHTML=html;
  document.getElementById("overlay").classList.add("open");
}
function closePopup(){document.getElementById("overlay").classList.remove("open");}

function showMilestones(dIdx,filter){
  var d=D[dIdx];if(!d)return;
  var name=(d["Initiative"]||"").replace(/^I\d+\s*-\s*/,"").trim();
  var items=(d["_milestones"]||[]).filter(function(m){return m.status===filter;});
  var rows=items.map(function(m){return{name:m.name,status:m.status,meta:"Start: "+m.start+" → End: "+m.end+(m.priority?" · "+m.priority+" priority":""),notes:m.notes||""};});
  openPopup(name,filter+" milestones",items.length+" item"+(items.length!==1?"s":""),rows);
}
function showDeliverables(dIdx,filter){
  var d=D[dIdx];if(!d)return;
  var name=(d["Initiative"]||"").replace(/^I\d+\s*-\s*/,"").trim();

function scrollToSection(id){var el=document.getElementById(id);if(el)el.scrollIntoView({behavior:"smooth",block:"start"});}

// ── RENDER ──────────────────────────────────────────────────
function render(payload){
  var data=payload.initiatives||[];
  var le=payload.lastEdit||"";
  D=data;
  if(!data.length){document.getElementById("main").innerHTML='<div class="loading" style="color:var(--red)">No data. Run OrbitNext PMO menu from the sheet first.</div>';return;}

  // Format timestamp in IST
  document.getElementById("ts").textContent=le?formatIST(le):"—";

  var wk=weekNum();
  var months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  var now=new Date();now.setHours(0,0,0,0);
  var cutoff=new Date(now.getTime()+14*24*60*60*1000);

  var totalDelayed=0;
  data.forEach(function(d){
    totalDelayed+=(d["_milestones"]||[]).filter(function(m){return m.status==="Delayed";}).length;
    totalDelayed+=(d["_deps"]||[]).filter(function(x){return x.status==="Blocked";}).length;
    totalDelayed+=(d["_deliverables"]||[]).filter(function(x){return x.status==="Delayed";}).length;
  });

  var worstStatus="On Track";
  ["Off Track","At Risk","Needs Attention","Minor Concerns"].forEach(function(s){if(worstStatus==="On Track"&&data.some(function(d){return d["Overall Status"]===s;}))worstStatus=s;});

  var html="";

  // ── LEGEND ───────────────────────────────────────────────
  html+='<div class="legend-card">';
  html+='<div class="legend-title"><i class="ti ti-info-circle" style="color:var(--red);font-size:14px"></i>How to read this dashboard</div>';
  html+='<div class="legend-grid">';

  // Status
  html+='<div><div class="legend-block-title">Status</div>';
  [["#2E7D32","On Track","≥ 85"],["#F9A825","Minor Concerns","70–84"],["#FB8C00","Needs Attention","50–69"],["#EF5350","At Risk","30–49"],["#B71C1C","Off Track","< 30"]].forEach(function(s){
    html+='<div class="legend-row"><div class="legend-dot" style="background:'+s[0]+'"></div><span class="legend-label">'+s[1]+'</span><span class="legend-range">'+s[2]+'%</span></div>';
  });
  html+='</div>';

  // Scoring
  html+='<div><div class="legend-block-title">How scores work</div>';
  html+='<div class="legend-explain">';
  html+='<b>Base score</b> = Milestones (70%) + Metrics (30%)<br>';
  html+='<b>Final score</b> = Base ± adjustments<br><br>';
  html+='Adjustments nudge the base score up or down:<br>';
  html+='&nbsp;• Deliverables: ±5 pts<br>';
  html+='&nbsp;• Dependencies: ±7 pts<br>';
  html+='&nbsp;• Budget: ±3 pts<br><br>';
  html+='<b>Click the score ring</b> on any track for an AI-generated explanation of why it is where it is.';
  html+='</div></div>';

  // Trend
  html+='<div><div class="legend-block-title">Trend & interaction</div>';
  html+='<div class="legend-explain">';
  html+='<b>Improving</b> — score up &gt;5% vs last week<br>';
  html+='<b>Stable</b> — within ±5% of last week<br>';
  html+='<b>Declining</b> — score down &gt;5% vs last week<br><br>';
  html+='Milestone and deliverable counts are <b>clickable</b> — tap any count to see the full list with dates, priority and notes.<br><br>';
  html+='<b>Delayed &amp; blocked</b> count at the top scrolls to the flagged items.';
  html+='</div></div>';

  html+='</div></div>';

  // ── TOP STRIP ─────────────────────────────────────────────
  html+='<div class="top-strip">';
  html+='<div class="strip-cell"><div class="strip-lbl">Program week</div><div class="strip-val" style="color:var(--navy)">'+wk+' <span style="font-size:16px;color:var(--muted)">/ '+TOTAL_WEEKS+'</span></div><div class="strip-sub">Started May 2026</div></div>';
  html+='<div class="strip-cell clickable" onclick="scrollToSection(\'delayed-section\')" title="Click to jump to delayed items"><div class="strip-lbl">Delayed &amp; blocked <i class="ti ti-arrow-down" style="font-size:11px"></i></div><div class="strip-val" style="color:'+(totalDelayed>0?"#C62828":"#2E7D32")+'">'+totalDelayed+'</div><div class="strip-sub">'+(totalDelayed>0?"items need attention":"all clear")+'</div></div>';
  html+='<div class="strip-cell"><div class="strip-lbl">Program health</div><div style="margin-top:6px">'+pillHtml(worstStatus)+'</div><div class="strip-sub" style="margin-top:8px">based on lowest track</div></div>';
  html+='</div>';

  // ── TRACK SCORES: WEEK BY WEEK BAR CHARTS ─────────────────
  html+='<div class="sec-card">';
  html+='<div class="sec-hdr" style="background:linear-gradient(135deg,#1A1D2E,#2B2D42)">'
       +'<div class="sec-hdr-l"><i class="ti ti-chart-bar" style="color:rgba(255,255,255,.5);font-size:16px"></i>'
       +'<span class="sec-hdr-title" style="color:rgba(255,255,255,.9)">Track scores — week by week</span></div>'
       +'<span class="sec-hdr-badge" style="color:rgba(255,255,255,.5)">Last '+wk+' week'+(wk!==1?"s":"")+'</span></div>';
  html+='<div class="sec-body"><div class="trend-grid">';

  data.forEach(function(d){
    var history=d["ScoreHistory"]||[];
    var name=(d["Initiative"]||"").replace(/^I\d+\s*-\s*/,"").trim();
    var score=d["Overall Score"]||0;
    var trend=d["Trend"]||"stable";
    var currentColor=progColor(score);

    html+='<div class="trend-track">';
    html+='<div class="trend-track-hdr"><span class="trend-track-name">'+name+'</span>'+trendArrow(trend)+'</div>';

    if(!history.length){
      html+='<div class="no-trend">No history yet — scores will appear after the first weekly run.</div>';
    } else {
      // Fill up to wk bars (pad with nulls for missing weeks)
      var byWeek={};
      history.forEach(function(h){byWeek[h.week]=h.score;});
      var bars=[];
      for(var w=1;w<=wk;w++){bars.push({week:w,score:byWeek[w]!==undefined?byWeek[w]:null});}

      html+='<div class="trend-bars-wrap">';
      bars.forEach(function(b,i){
        var s=b.score;
        var ht=s!==null?Math.max(5,Math.round((s/100)*72)):5;
        var col=s!==null?progColor(s):"#EEF0F2";
        var isL=(i===bars.length-1);
        html+='<div class="t-col">';
        if(s!==null) html+='<div class="t-bar-val" style="color:'+(isL?"var(--navy)":"var(--muted)")+';font-weight:'+(isL?"700":"400")+'">'+s+'</div>';
        html+='<div class="t-bar" style="height:'+ht+'px;background:'+col+';opacity:'+(isL?1:.65)+'" title="Week '+b.week+': '+(s!==null?s:"no data")+'"></div>';
        html+='<div class="t-bar-lbl">W'+b.week+'</div>';
        html+='</div>';
      });
      html+='</div>';

      // Current score callout
      html+='<div style="display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">'
           +'<span style="font-size:12px;color:var(--muted)">Current score</span>'
           +'<span style="font-size:18px;font-weight:700;font-family:\'DM Mono\',monospace;color:'+currentColor+'">'+score+'%</span>'
           +'</div>';
    }
    html+='</div>';
  });

  html+='</div></div></div>';

  // ── WHAT HAS DELAYED ─────────────────────────────────────
  var delRows={milestone:[],dependency:[],deliverable:[]};
  data.forEach(function(d){
    var nm=(d["Initiative"]||"").replace(/^I\d+\s*-\s*/,"").trim();
    (d["_milestones"]||[]).filter(function(x){return x.status==="Delayed";}).forEach(function(m){delRows.milestone.push({name:m.name,detail:"End: "+m.end+(m.priority?" · "+m.priority+" priority":""),init:nm,dot:"#C62828"});});
    (d["_deps"]||[]).filter(function(x){return x.status==="Blocked";}).forEach(function(dep){delRows.dependency.push({name:dep.name,detail:"Provider: "+(dep.provider||"?")+" · "+dep.priority+" priority",init:nm,dot:"#B71C1C"});});
    (d["_deliverables"]||[]).filter(function(x){return x.status==="Delayed";}).forEach(function(dl){delRows.deliverable.push({name:dl.name,detail:"Target: "+(dl.targetDate||"?"),init:nm,dot:"#E65100"});});
  });
  var totalDel=delRows.milestone.length+delRows.dependency.length+delRows.deliverable.length;

  html+='<div class="sec-card" id="delayed-section">';
  html+='<div class="sec-hdr" style="background:linear-gradient(135deg,#4A0000,#7A1518)">'
       +'<div class="sec-hdr-l"><i class="ti ti-alert-triangle" style="color:rgba(255,255,255,.5);font-size:16px"></i><span class="sec-hdr-title" style="color:rgba(255,255,255,.9)">What has delayed</span></div>'
       +'<span class="sec-hdr-badge" style="color:rgba(255,255,255,.5)">'+totalDel+' item'+(totalDel!==1?"s":"")+'</span></div>';
  html+='<div class="sec-body">';
  if(!totalDel){
    html+='<div class="all-clear"><i class="ti ti-circle-check" style="font-size:20px"></i>Nothing delayed or blocked. All clear.</div>';
  } else {
    var tConf=[{key:"milestone",label:"Delayed milestones",icon:"ti-flag-2",color:"#C62828",bdr:"#FFCDD2",stripe:"#FFF5F5"},{key:"dependency",label:"Blocked dependencies",icon:"ti-link",color:"#B71C1C",bdr:"#FFCDD2",stripe:"#FFF5F5"},{key:"deliverable",label:"Delayed deliverables",icon:"ti-package",color:"#E65100",bdr:"#FFE0B2",stripe:"#FFF8F0"}];
    tConf.forEach(function(tc){
      var rows=delRows[tc.key];if(!rows.length)return;
      html+='<div class="del-group"><div style="display:flex;align-items:center;gap:6px;margin-bottom:8px"><i class="ti '+tc.icon+'" style="color:'+tc.color+';font-size:14px"></i><span style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:'+tc.color+'">'+tc.label+' ('+rows.length+')</span></div>';
      html+='<div class="del-list" style="border:1px solid '+tc.bdr+';border-radius:10px;overflow:hidden">';
      rows.forEach(function(r,i){
        html+='<div class="del-row" style="background:'+(i%2===0?"#fff":tc.stripe)+';border-bottom-color:'+tc.bdr+'">'
             +'<div class="del-dot" style="background:'+r.dot+'"></div>'
             +'<div style="flex:1;min-width:0"><div class="del-name-text">'+r.name+'</div><div class="del-detail">'+r.detail+'</div></div>'
             +'<div class="init-tag" style="background:'+r.dot+'">'+r.init+'</div></div>';
      });
      html+='</div></div>';
    });
  }
  html+='</div></div>';

  // ── UPCOMING ─────────────────────────────────────────────
  var upcoming=[];
  data.forEach(function(d){
    var nm=(d["Initiative"]||"").replace(/^I\d+\s*-\s*/,"").trim();
    (d["_milestones"]||[]).forEach(function(m){
      if(m.status==="Completed"||m.status==="Delayed")return;
      var dt=parseDate(m.end);if(!dt)return;
      if(dt>=now&&dt<=cutoff)upcoming.push({name:m.name,init:nm,date:dt,status:m.status,priority:m.priority||""});
    });
  });
  upcoming.sort(function(a,b){return a.date-b.date;});

  html+='<div class="sec-card">';
  html+='<div class="sec-hdr" style="background:linear-gradient(135deg,#1B5E20,#2E7D32)">'
       +'<div class="sec-hdr-l"><i class="ti ti-calendar-event" style="color:rgba(255,255,255,.5);font-size:16px"></i><span class="sec-hdr-title" style="color:rgba(255,255,255,.9)">What\'s coming up — next 2 weeks</span></div>'
       +'<span class="sec-hdr-badge" style="color:rgba(255,255,255,.5)">'+upcoming.length+' milestone'+(upcoming.length!==1?"s":"")+'</span></div>';
  html+='<div class="sec-body">';
  if(!upcoming.length){
    html+='<div style="font-size:13px;color:var(--muted);font-style:italic">No milestones due in the next 2 weeks.</div>';
  } else {
    html+='<div class="up-list">';
    upcoming.forEach(function(r,i){
      var dL=Math.round((r.date-now)/86400000);
      var urg=dL<=3?"#C62828":dL<=7?"#E65100":"#1565C0";
      var dot=SDOT[r.status]||"#9b9fad";
      html+='<div class="up-row" style="background:'+(i%2===0?"#fff":"#F1F8F1")+'">'
           +'<div class="up-date" style="background:'+urg+'18;border-color:'+urg+'44;color:'+urg+'"><div class="up-date-d">'+r.date.getDate()+'</div><div class="up-date-m">'+months[r.date.getMonth()]+'</div></div>'
           +'<div style="flex:1;min-width:0"><div class="up-name">'+r.name+'</div><div class="up-meta"><div style="width:6px;height:6px;border-radius:50%;background:'+dot+'"></div>'+r.status+(r.priority?" · "+r.priority+" priority":"")+'</div></div>'
           +'<div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0">'
           +'<div class="init-tag" style="background:#2E7D32">'+r.init+'</div>'
           +'<div class="up-days" style="color:'+urg+'">'+(dL===0?"Today":dL===1?"Tomorrow":"in "+dL+" days")+'</div></div></div>';
    });
    html+='</div>';
  }
  html+='</div></div>';

  // ── TRACK CARDS ──────────────────────────────────────────
  html+='<div class="tracks">';
  data.forEach(function(d,dIdx){
    var status=d["Overall Status"]||"Needs Attention";
    var score=d["Overall Score"]||0;
    var color=progColor(score);
    var iname=d["Initiative"]||"";
    var dispName=iname.replace(/^I\d+\s*-\s*/,"").trim();
    var owners=d["Owners"]||"—";
    var mentors=d["Mentors"]||"—";
    var timeline=d["Timeline"]||"";
    var trend=d["Trend"]||"stable";
    var weeksAt=d["WeeksAtStatus"]||1;
    var history=d["ScoreHistory"]||[];
    var ms=d["_milestones"]||[];
    var msTotal=ms.length;
    var msDone=ms.filter(function(m){return m.status==="Completed";}).length;
    var msIP=ms.filter(function(m){return m.status==="In Progress";}).length;
    var msHold=ms.filter(function(m){return m.status==="On Hold";}).length;
    var msDl=ms.filter(function(m){return m.status==="Delayed";}).length;
    var msNS=ms.filter(function(m){return m.status==="Not Started";}).length;
    var msPct=msTotal>0?Math.round(msDone/msTotal*100):0;
    var delivs=d["_deliverables"]||[];
    var hasDelivs=delivs.length>0;
    var dlDone=delivs.filter(function(x){return x.status==="Completed";}).length;
    var dlIP=delivs.filter(function(x){return x.status==="In Progress";}).length;
    var dlDl=delivs.filter(function(x){return x.status==="Delayed";}).length;
    var dlNS=delivs.filter(function(x){return x.status==="Not Started";}).length;
    var metrics=d["_metrics"]||[];
    var budget=d["_budget"]||[];

    html+='<div class="tcard">';
    html+='<div class="tcard-accent" style="background:'+color+'"></div>';

    // TOP
    html+='<div class="tcard-top">';
    html+='<div><div class="tcard-name">'+dispName+'</div>'
         +'<div class="tcard-person-row"><i class="ti ti-users"></i><span class="tcard-person-label">Owners</span>'+owners+'</div>'
         +'<div class="tcard-person-row"><i class="ti ti-user-star"></i><span class="tcard-person-label">Mentors</span>'+mentors+'</div>'
         +'<div class="tcard-person-row"><i class="ti ti-calendar"></i><span class="tcard-person-label">Timeline</span>'+timeline+' · Week '+wk+'</div>'
         +'</div>';
    html+='<div class="tcard-right">';
    html+=scoreRing(score,color,dIdx);
    html+='<div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">';
    html+=pillHtml(status);
    html+='<div style="display:flex;align-items:center;gap:8px">'+trendArrow(trend)+'<span style="font-size:12px;color:var(--muted)">'+weeksAt+' wk'+(weeksAt!==1?"s":"")+'</span></div>';
    html+=sparkline(history);
    html+='</div></div></div>';

    // MILESTONES + DELIVERABLES
    html+='<div class="tcard-body">';
    // Milestones
    html+='<div class="tcard-section"><div class="tsec-hdr"><span class="tsec-title" style="color:#1565C0"><i class="ti ti-flag-2"></i>Milestones</span><span class="tsec-badge" style="background:#E3F2FD;color:#1565C0">'+msPct+'% done</span></div>';
    html+='<div class="ms-prog-bar"><div class="ms-prog-fill" style="width:'+msPct+'%;background:'+progColor(d["MilestoneScore"]||0)+'"></div></div>';
    html+='<div class="ms-counts">';
    [{l:"Completed",v:msDone,c:"#2E7D32",f:"Completed"},{l:"In Progress",v:msIP,c:"#1565C0",f:"In Progress"},{l:"Not Started",v:msNS,c:"#9b9fad",f:"Not Started"},{l:"On Hold",v:msHold,c:"#F9A825",f:"On Hold"},{l:"Delayed",v:msDl,c:"#C62828",f:"Delayed"}].forEach(function(x){
      html+='<div class="ms-count-btn" onclick="showMilestones('+dIdx+',\''+x.f+'\')">'
           +'<div class="ms-count-dot" style="background:'+x.c+'"></div>'
           +'<span class="ms-count-label">'+x.l+'</span><span class="ms-count-val">'+x.v+'</span></div>';
    });
    html+='</div></div>';
    // Deliverables
    if(hasDelivs){
      html+='<div class="tcard-section"><div class="tsec-hdr"><span class="tsec-title" style="color:#1B5E20"><i class="ti ti-package"></i>Deliverables</span><span class="tsec-badge" style="background:#E8F5E9;color:#1B5E20">'+delivs.length+' total</span></div>';
      html+='<div class="ms-counts" style="margin-top:8px">';
      [{l:"Completed",v:dlDone,c:"#2E7D32",f:"Completed"},{l:"In Progress",v:dlIP,c:"#1565C0",f:"In Progress"},{l:"Not Started",v:dlNS,c:"#9b9fad",f:"Not Started"},{l:"Delayed",v:dlDl,c:"#C62828",f:"Delayed"}].forEach(function(x){
        html+='<div class="ms-count-btn" onclick="showDeliverables('+dIdx+',\''+x.f+'\')">'
             +'<div class="ms-count-dot" style="background:'+x.c+'"></div>'
             +'<span class="ms-count-label">'+x.l+'</span><span class="ms-count-val">'+x.v+'</span></div>';
      });
      html+='</div></div>';
    } else {
      html+='<div class="tcard-section" style="display:flex;align-items:center;justify-content:center"><span style="font-size:12px;color:var(--muted);font-style:italic">Deliverables not applicable for this track</span></div>';
    }
    html+='</div>';

    // METRICS + BUDGET
    html+='<div class="tcard-body-three">';
    // Metrics
    html+='<div class="tcard-section" style="grid-column:1/3"><div class="tsec-hdr"><span class="tsec-title" style="color:#1A5276"><i class="ti ti-chart-line"></i>Success Metrics</span><span class="tsec-badge" style="background:#E3F2FD;color:#1A5276">target vs actual</span></div>';
    if(!metrics.length){
      html+='<div style="font-size:13px;color:var(--muted);font-style:italic">No metrics defined.</div>';
    } else {
      metrics.forEach(function(m){
        var hasAct=m.actual&&m.actual.trim()!=="";
        var isRatio=(m.unit||"").toLowerCase()==="ratio";
        var barPct=0,actColor="#1A5276";
        if(hasAct&&!isRatio){
          var tNum=parseFloat((m.target||"").replace(/[^0-9.\-]/g,""));
          var aNum=parseFloat((m.actual||"").replace(/[^0-9.\-]/g,""));
          if(!isNaN(tNum)&&!isNaN(aNum)&&tNum>0){barPct=Math.min(100,Math.round(aNum/tNum*100));actColor=aNum>=tNum?"#2E7D32":aNum>=tNum*0.7?"#F9A825":"#C62828";}
        }
        html+='<div class="metric-row">'
             +'<div class="metric-name">'+m.name+(m.unit?' <span style="font-size:11px;color:var(--muted)">('+m.unit+')</span>':'')+'</div>'
             +'<div style="text-align:right;min-width:120px">'
             +'<div style="font-size:11px;color:var(--muted)">Target: '+m.target+'</div>'
             +(hasAct?'<div style="font-size:13px;font-weight:700;font-family:\'DM Mono\',monospace;color:'+actColor+'">'+m.actual+'</div>':'<div class="metric-not-entered">not entered</div>')
             +'</div>'
             +((!isRatio&&hasAct)?'<div class="metric-bar"><div class="metric-bar-fill" style="width:'+barPct+'%;background:'+actColor+'"></div></div>':'')
             +'</div>';
      });
    }
    html+='</div>';
    // Budget
    html+='<div class="tcard-section"><div class="tsec-hdr"><span class="tsec-title" style="color:#1E5631"><i class="ti ti-currency-dollar"></i>Budget</span></div>';
    if(!budget.length){
      html+='<div style="font-size:13px;color:var(--muted);font-style:italic">No budget lines entered.</div>';
    } else {
      var currencies={};
      budget.forEach(function(b){var cur=b.currency||"?";if(!currencies[cur])currencies[cur]={approved:0,exposure:0};currencies[cur].approved+=b.approved;currencies[cur].exposure+=(b.exposure||b.spent+b.committed);});
      Object.keys(currencies).forEach(function(cur){
        var g=currencies[cur];
        var vp=g.approved>0?Math.round((g.exposure-g.approved)/g.approved*100):0;
        var bc=Math.abs(vp)>15?"#C62828":Math.abs(vp)>5?"#F9A825":"#2E7D32";
        html+='<div class="bud-summary">';
        html+='<div class="bud-stat"><div class="bud-stat-label">Approved</div><div class="bud-stat-val">'+fmt(g.approved)+'</div><div class="bud-stat-cur">'+cur+'</div></div>';
        html+='<div class="bud-stat"><div class="bud-stat-label">Exposure</div><div class="bud-stat-val" style="color:'+bc+'">'+fmt(g.exposure)+'</div><div class="bud-stat-cur">'+(g.exposure===0?"nothing committed yet":(vp>0?"+"+vp+"% over":Math.abs(vp)+"% under"))+'</div></div>';
        html+='</div>';
      });
    }
    html+='</div></div>';
    html+='</div>';
  });
  html+='</div>';
  document.getElementById("main").innerHTML=html;
}

function formatIST(str){
  // str comes from Apps Script toLocaleString - reformat to IST AM/PM
  try{
    var d=new Date(str);
    if(isNaN(d)){
      // try parsing "16/06/2026, 4:30:00 pm"
      return str;
    }
    return d.toLocaleString("en-IN",{timeZone:"Asia/Kolkata",day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit",hour12:true})+" IST";
  }catch(e){return str;}
}

function loadData(){
  document.getElementById("ts").textContent="Refreshing...";
  document.getElementById("main").innerHTML='<div class="loading"><div class="spinner"></div>Loading initiative data...</div>';
  fetch(DATA_URL).then(function(r){return r.json();}).then(function(p){render(p);}).catch(function(err){document.getElementById("main").innerHTML='<div class="loading" style="color:var(--red)">Error: '+err.message+'</div>';});
}
window.onload=loadData;
</script>
</body>
</html>
